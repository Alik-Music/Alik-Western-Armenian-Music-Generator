services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: alike_db
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_NAME: ${APP_NAME:-musicgen-backend}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongo:27017}
      SPRING_DATA_MONGODB_DATABASE: ${SPRING_DATA_MONGODB_DATABASE:-alike_db}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FEATURE_PROVIDER_SUBMISSION_ENABLED: ${FEATURE_PROVIDER_SUBMISSION_ENABLED:-false}
      FEATURE_CALLBACK_PROCESSING_ENABLED: ${FEATURE_CALLBACK_PROCESSING_ENABLED:-true}
      FEATURE_ADMIN_ENDPOINTS_ENABLED: ${FEATURE_ADMIN_ENDPOINTS_ENABLED:-true}
      PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-https://api.sunoapi.org}
      PROVIDER_API_KEY: ${PROVIDER_API_KEY}
      PROVIDER_CALLBACK_BASE_URL: ${PROVIDER_CALLBACK_BASE_URL:-http://localhost:3000}
      MEDIA_STORAGE_ROOT_PATH: ${MEDIA_STORAGE_ROOT_PATH:-/app/storage}
      MEDIA_STORAGE_PUBLIC_BASE_URL: ${MEDIA_STORAGE_PUBLIC_BASE_URL:-http://localhost:3000}
      AUTH_ADMIN_EMAILS: ${AUTH_ADMIN_EMAILS:-admin@balians.local}
      AUTH_DEFAULT_INVITE_CODE: ${AUTH_DEFAULT_INVITE_CODE:-BALIANS-INVITE}
      AUTH_EXPOSE_OTP_IN_RESPONSE: ${AUTH_EXPOSE_OTP_IN_RESPONSE:-false}
    expose:
      - "8080"
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:8080}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:8080}
      NEXT_PUBLIC_DEFAULT_PROJECT_ID: ${NEXT_PUBLIC_DEFAULT_PROJECT_ID:-project-1}
    expose:
      - "3000"

volumes:
  mongo_data:
  backend_storage:
